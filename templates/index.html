<!DOCTYPE html>
<html>
<head>
    <title>Zimma AI</title>
    <style>
        body { background: #0d0d0d; color: #00ffcc; font-family: Arial; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { font-size: 2em; }
        #chatbox { width: 600px; height: 400px; background: #1a1a1a; border-radius: 10px; padding: 15px; overflow-y: scroll; margin-bottom: 10px; }
        .zimma { color: #00ffcc; }
        .you { color: #ffffff; text-align: right; }
        input { width: 500px; padding: 10px; border-radius: 5px; border: none; background: #1a1a1a; color: white; font-size: 1em; }
        button { padding: 10px 20px; background: #00ffcc; color: black; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
    </style>
</head>
<body>
    <h1>Zimma AI 🤖</h1>
    <div id="chatbox"><p class="zimma">Zimma: Hey, I'm online. Talk to me.</p></div>
    <div>
        <input type="text" id="userInput" placeholder="Say something..." onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button onclick="sendMessage()">Send</button>
    </div>
    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const chatbox = document.getElementById("chatbox");
            const msg = input.value.trim();
            if (!msg) return;
            chatbox.innerHTML += `<p class="you">You: ${msg}</p>`;
            input.value = "";
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            chatbox.innerHTML += `<p class="zimma">Zimma: ${data.response}</p>`;
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
